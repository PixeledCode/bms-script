name: 🔁 Check BMS for Movie

on:
  schedule:
    - cron: "*/10 * * * *"  # Every 15 minutes
  workflow_dispatch:        # Manual trigger support

jobs:
  check_movie:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: ⚙️ Install dependencies
        run: |
          pip install playwright
          python -m playwright install

      - name: 🔎 Run movie checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python bms_checker.py

      - name: 📌 Commit flag if movie found
        if: success() && hashFiles('.movie_found') != ''
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .movie_found
          git commit -m "Movie found, stopping further checks"
          git push
